user nginx;
worker_processes auto;
worker_rlimit_nofile 8192;

events {
  worker_connections 4096;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65s;
  keepalive_requests 1000;
  client_max_body_size 4m;
  server_tokens off;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_comp_level 5;
  gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
  }

  map $http_cookie $locale_variant {
    default en;
    ~*vod_locale=fa fa;
  }

  map $request_method $skip_method_cache {
    default 1;
    GET 0;
    HEAD 0;
  }

  map $http_accept $skip_non_html_cache {
    default 1;
    ~*text/html 0;
  }

  map $http_rsc $skip_rsc_cache {
    default 1;
    "" 0;
  }

  limit_req_zone $binary_remote_addr zone=search_rate:10m rate=8r/s;
  limit_req_zone $binary_remote_addr zone=external_api_rate:10m rate=2r/s;
  limit_conn_zone $binary_remote_addr zone=per_ip_connections:10m;

  proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:20m max_size=200m inactive=2h use_temp_path=off;
  proxy_cache_path /var/cache/nginx/pages levels=1:2 keys_zone=page_cache:30m max_size=500m inactive=1h use_temp_path=off;

  upstream sarvnema_app {
    server app:3004;
    keepalive 64;
  }

  server {
    listen 80 default_server;
    server_name sarvnema.ir www.sarvnema.ir _;
    limit_conn per_ip_connections 40;

    location = /healthz {
      proxy_pass http://sarvnema_app;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      access_log off;
    }

    location = /readyz {
      proxy_pass http://sarvnema_app;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      access_log off;
    }

    location /socket.io/ {
      proxy_pass http://sarvnema_app;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 75s;
      proxy_send_timeout 75s;
      proxy_buffering off;
      proxy_cache off;
    }

    location ~ ^/api/(suggest|ai-search)$ {
      limit_req zone=search_rate burst=24 nodelay;
      proxy_pass http://sarvnema_app;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache api_cache;
      proxy_cache_key "$scheme$request_method$host$request_uri";
      proxy_cache_lock on;
      proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;
      add_header X-Proxy-Cache $upstream_cache_status always;
    }

    location ^~ /api/subtitles/ {
      limit_req zone=external_api_rate burst=8 nodelay;
      proxy_pass http://sarvnema_app;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache api_cache;
      proxy_cache_lock on;
      proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;
      add_header X-Proxy-Cache $upstream_cache_status always;
    }

    location ~ ^/api/(downloads|suggestions|watch-party/title)/ {
      limit_req zone=search_rate burst=24 nodelay;
      proxy_pass http://sarvnema_app;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache api_cache;
      proxy_cache_lock on;
      proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;
      add_header X-Proxy-Cache $upstream_cache_status always;
    }

    # Archive synchronization is intentionally unavailable on the public edge.
    # Run it through a VPN/SSH tunnel or a separate authenticated admin host.
    location ^~ /api/admin/ {
      return 404;
    }

    # JSON catalogs are server-side implementation details. In particular,
    # exposing the 360 MB source archive would create an avoidable bandwidth DoS.
    location ^~ /data/ {
      return 404;
    }

    location /_next/static/ {
      proxy_pass http://sarvnema_app;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location / {
      proxy_pass http://sarvnema_app;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 5s;
      proxy_read_timeout 30s;

      # Only initial HTML documents are cached. RSC navigation requests are
      # always passed through because their payload depends on router headers.
      proxy_cache page_cache;
      proxy_cache_key "$scheme$host$request_uri:$locale_variant";
      proxy_cache_bypass $skip_method_cache $skip_non_html_cache $skip_rsc_cache;
      proxy_no_cache $skip_method_cache $skip_non_html_cache $skip_rsc_cache;
      proxy_ignore_headers Cache-Control;
      proxy_cache_valid 200 5m;
      proxy_cache_lock on;
      proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;
      add_header X-Page-Cache $upstream_cache_status always;
    }
  }
}
