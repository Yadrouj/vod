services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3004
      HOSTNAME: 0.0.0.0
      NODE_OPTIONS: --max-old-space-size=1536
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-https://sarvnema.ir}
      WATCH_PARTY_MAX_ROOMS: ${WATCH_PARTY_MAX_ROOMS:-500}
      WATCH_PARTY_MAX_PARTICIPANTS: ${WATCH_PARTY_MAX_PARTICIPANTS:-50}
      WATCH_PARTY_MAX_VOICE_PARTICIPANTS: ${WATCH_PARTY_MAX_VOICE_PARTICIPANTS:-10}
      WATCH_PARTY_ICE_SERVERS: ${WATCH_PARTY_ICE_SERVERS:-}
      WATCH_PARTY_MAX_QUEUE: ${WATCH_PARTY_MAX_QUEUE:-100}
      BOT_API_TOKEN: ${BOT_API_TOKEN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-Sarvnema_bot}
    restart: unless-stopped
    stop_grace_period: 20s
    mem_limit: 2g
    cpus: 2.0
    volumes:
      - ./data:/app/data
    expose:
      - "3004"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3004/readyz"]
      interval: 20s
      timeout: 3s
      start_period: 30s
      retries: 3

  nginx:
    image: nginx:1.28-alpine
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_cache:/var/cache/nginx
    mem_limit: 256m
    cpus: 0.5

volumes:
  nginx_cache:
