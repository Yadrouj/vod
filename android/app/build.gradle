plugins {
    id "com.android.application"
}

android {
    namespace "com.ramagh.webview"
    compileSdk 35

    defaultConfig {
        applicationId "com.ramagh.webview"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "1.0.0"

        buildConfigField "String", "WEBVIEW_URL", "\"http://10.0.2.2:3001\""
    }

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
