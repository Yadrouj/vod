# Production deploy for VOD (sarvnema.ir) on the infrastructure host (185.203.118.87).
#
# Joins the EXISTING `infrastructure_default` network so the dockerised nginx
# (mn2-nginx) can reverse-proxy to it by name. TLS is terminated upstream at the
# ArvanCloud CDN; nginx serves this origin over plain HTTP (like the other sites).
#
# Usage:  docker compose -f docker-compose.prod.yml up -d --build
name: vod

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: vod-app
    container_name: vod-app
    restart: unless-stopped
    env_file:
      # Optional at run time (no required server secrets); NEXT_PUBLIC_* are baked
      # at build time. required:false so `up` still works if you skip the file.
      - path: .env.local
        required: false
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    networks:
      - edge

networks:
  # Pre-existing network owned by the infrastructure stack (holds mn2-nginx).
  edge:
    external: true
    name: infrastructure_default
